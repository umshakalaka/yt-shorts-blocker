<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shorts Blocker</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 260px;
      background: #0f0f0f;
      color: #e8e8e8;
      font-family: 'Space Mono', monospace;
      padding: 20px 18px 18px;
      user-select: none;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      background: #ff0000;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }

    .logo-icon::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        45deg,
        transparent,
        transparent 4px,
        rgba(0,0,0,0.15) 4px,
        rgba(0,0,0,0.15) 8px
      );
    }

    .logo-text {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.05em;
      line-height: 1.2;
    }

    .logo-text span {
      color: #ff4444;
    }

    .status-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 14px;
    }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .status-label {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #888;
    }

    .toggle {
      position: relative;
      width: 42px;
      height: 24px;
    }

    .toggle input { display: none; }

    .toggle-track {
      position: absolute;
      inset: 0;
      background: #333;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .toggle input:checked + .toggle-track { background: #22c55e; }

    .toggle-thumb {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 18px;
      height: 18px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
      pointer-events: none;
    }

    .toggle input:checked ~ .toggle-thumb { transform: translateX(18px); }

    .status-indicator {
      margin-top: 10px;
      font-size: 11px;
      color: #22c55e;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-indicator.off { color: #888; }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: currentColor;
      animation: pulse 1.5s infinite;
    }

    .status-indicator.off .dot { animation: none; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .blocked-list {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 14px;
    }

    .blocked-title {
      font-size: 9px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 10px;
    }

    .blocked-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: #aaa;
      padding: 4px 0;
      border-bottom: 1px solid #222;
    }

    .blocked-item:last-child { border-bottom: none; }

    .check {
      color: #ff4444;
      font-size: 10px;
      flex-shrink: 0;
    }

    .footer {
      font-size: 9px;
      color: #444;
      text-align: center;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="logo">
    <div class="logo-icon">✂</div>
    <div class="logo-text">SHORTS<br><span>BLOCKER</span></div>
  </div>

  <div class="status-card">
    <div class="status-row">
      <span class="status-label">Blocking Active</span>
      <label class="toggle">
        <input type="checkbox" id="toggleSwitch" checked />
        <div class="toggle-track"></div>
        <div class="toggle-thumb"></div>
      </label>
    </div>
    <div class="status-indicator" id="statusText">
      <div class="dot"></div>
      Shorts are being blocked
    </div>
  </div>

  <div class="blocked-list">
    <div class="blocked-title">What's removed</div>
    <div class="blocked-item"><span class="check">✕</span> Left sidebar Shorts link</div>
    <div class="blocked-item"><span class="check">✕</span> Home feed Shorts shelf</div>
    <div class="blocked-item"><span class="check">✕</span> Search result Shorts</div>
    <div class="blocked-item"><span class="check">✕</span> Recommendation Shorts</div>
    <div class="blocked-item"><span class="check">✕</span> Redirects /shorts/ → /watch/</div>
  </div>

  <div class="footer">reload youtube tab after toggling</div>

  <script src="popup.js"></script>
</body>
</html>
